body:
  text: 頭風治頭風萆麻仁乳香研塗患處立愈天南星一個艾五錢煎湯熏之痛久欲失明者川烏去皮細辛防風蠍梢等分研細薑汁調貼患處若眉目牽引不正貼太陽穴面皺面上皺路大豬蹄四枚洗淨煮如膠臥時用塗面上次早以漿水洗去半月後面皮細潔如童子肺癰肺癰冬月醃芥菜滷貯壇封埋土中年久則清淡如水略無鹹味飲之甚效或和淡腐漿服蕺草俗名魚腥草水煮不住口食之甚效金絲荷葉草搗汁同生白酒數飲立效橘葉搗汁服吐出膿血即愈經霜黃菊葉絞汁冷服亦治腸癰立秋後擇粗大絲瓜藤或南瓜藤掘起根三四寸剪斷插瓶中其汁滴貯瓶內封埋土中年久愈佳兼治喉蛾哮喘柘黃即柘樹上菌厚大而色黃者用井水磨服以愈為度或用鯉魚重四兩者一尾去腸勿見水入貝母末二錢縫好童溺半碗浸之重湯煮至睛出去鱗骨食之甚效痰哮痰哮浸濕海帶四兩煎湯調飴糖服淡豆腐漿每晨飲之兼治黃疸漂淡陳海蛇煎湯生蘆蔔搗汁和服兼治諸痰證喉疹爛喉時疹錫類散象牙屑焙廉珠各三分飛青黛六分梅花冰片三釐壁錢俗名喜子窠二十個用泥壁上者勿用木板上者西牛黃人手指甲男病用女女病用男各五釐共研極細粉吹患處雖瀕死者可救兼治乳蛾牙疳舌腐等證甚效蘆蔔菜於初冬攤於屋瓦上或掛樹枝上任其風吹日曬雨洗霜凌直至立春前一日收下懸掛檐下有風無日處陳久愈佳煎濃湯服冬春二季每晚食生蘆蔔數片可以免患喉證或以橄欖蘆蔔常煮湯代茶飲亦妙口鼻病口舌糜爛大紅薔薇葉焙燥研末搽之冬月用根重舌用不蛀牙皂四五挺去核炙焦荊芥穗二錢共為細末米醋調塗即消舌脹滿口生蒲黃搽上即愈舌衄以黑蒲黃末糝之或以辰砂一錢伏龍肝二錢鴨子清調服舌脹出口冰片一錢研敷舌出不收辰砂末敷之或暗擲碗盞於地聞聲即能驚人唇衄不止栗子一個連殼燒灰硫黃等分研末和敷煙管戳傷咽喉以龍眼核去黑皮焙搗極細用筆管吹患處即定疼止血居家者此藥須預備凡小兒頭面磕撲銅鐵戳傷諸患亦以此敷之愈後無瘢仍生毛髮風寒鼻淵蒼耳子辛夷花各三錢煎服風熱鼻淵絲瓜藤近根三五寸數株曬燥燒存性為末每一錢陳酒下久吃蘭香烟成鼻淵者白鯗脊骨燒煙燻洗之年久鼻淵煩勞則發者名曰腦漏宜瓊玉膏固本丸六味丸三才封髓丹之類久服自效諸物塞入鼻中而不能出者緊掩兩耳緊閉其口不使通氣以筆管吹其無物鼻孔則所入之物自出諸物吸入肺管而不能出者無藥可治喘急而死大概小兒或有此患然不必驚慌但捉兒兩足使倒懸則所入之物一咳即出肺風瘡酒磨鹿角尖濃塗久之自愈雀斑鹿角燒灰豬油調搽白附子生研臥時以豆腐擦洗後雞子清調塗鼻衄不止以本人鼻血紙捻蘸之右衄者點左眼角左衄者點右眼角左右並衄者點兩眼角內立效或以梔子炭研末吹入鼻中立愈耳目病耳暴聾木香研末酒浸一宿以酒滴耳中少頃倒出三次即愈白蒺藜炒去刺為末蜜丸服靈磁石豆大者一塊同穿山甲煅研末棉裹塞耳中口含生鐵一塊覺耳中如風雨聲即通耳衄龍骨末吹之又炒黑蒲黃研末吹之亦敷舌衄耳聤血餘一錢冰片七釐研勻吹之耳爛燈心陳皮各一錢燒灰加冰片一分研吹頭風損目以大川貝母一粒白胡椒七粒共研末蔥白汁丸如柏子大以膏藥蓋貼太陽穴目可重明赤眼黃丹白蜜調貼太陽穴止痛如神田中潔淨柔泥搓丸撳扁貼兩眼皮一夜兩丸立效如睡熟候醒方換芙蓉葉末水和貼太陽穴芒硝荊芥穗泡湯溫洗黃連為末雞子清調勻左眼貼左足心右眼貼右足心目翳胡桃肉鳧茈柿餅等分搗煬開水調服目星樟腦東丹等分研細瓷器封貯左目吹右鼻棉塞之隔宿即退右目仿此白蒺藜三錢水煎日洗三次效目障鵝兒不食草川芎青黛各等分為末搐鼻取嚏遠年者亦效望江青又名天脂麻一兩羊肝一具同豆腐煮食小兒疳氣攻目雞肝一具不落水竹刀切片用牡蠣粉八分飛辰砂少許拌勻糝入飯鍋上蒸熟食之如此十次翳障退淨當時忌食茶湯油膩煙油入目如將他物洗之愈洗愈疼甚至損瞎須用亂髮緩緩揉之自愈天絲入目頭垢點入眼內即出又方雄雞冠血滴入眼內少頃看有紅絲將燈心捲去或用好墨磨濃塗眼內看有黑絲亦用燈心捲去白礬水一碗將舌舔之有絲入水即愈或以筆管吹其礬水泡起濺目絲亦能出塵芒入目生藕洗搗棉裹滴汁入目中即出也石灰擦眼山梔子煎濃汁不住手洗一二時辰痛即止或用活五穀蟲淘淨搗攤油紙上用布扎好七日不可動藥自落目無恙眼角出血槐花炒焦煎服損目破睛牛口涎每日點兩次須要避風黑睛破者亦瘳青盲用二蠶砂三斗曬燥每晨服三四錢淡鹽湯下眼堂成漏凡眼下生癤出膿流水不幹日久成漏諸藥不效以柿餅去皮取肉杵爛塗旬日愈眼癬用銀杏葉泡湯少加枯礬末溫洗漸愈奇效牙病牙疼經霜西瓜皮燒灰敷患處牙縫內立效黑山梔桑葉泡濃湯熱漱不痛乃止兒茶貼患處流出風涎自愈不可咽下石膏火煨熟八兩白蒺藜去刺四兩為極細末頻擦之立愈每日用之可免此患蓽撥一錢川椒五分石膏三錢青鹽四分共研細點患處立愈青鹽蓬砂火硝樟腦各一錢研末擦之馬蘭頭葉水溝或水缸內青苔共杵爛以棉卷之左痛塞左耳右亦然牙衄絲瓜藤炙灰擦之立止或用絲瓜絡亦可酒調下兼治腸紅草決明煎湯含之即止馬蘭頭杵爛塞患處立止槐花炒為末搽之瘰癧瘰癧俗名癧𤶱用天明精五六枝同𩺀魚煮熟但飲其汁數次自愈羚羊角燒灰研細雞卵清和塗兼治斑毒豬膽汁以胭脂邊一方滲透懸風處吹乾剪貼患處豆腐泔水一桶慢熬成膏頻頻塗之三桑葉曬乾為末赤沙糖調服數兩自愈南星半夏等分為末米醋或雞子清調敷黃柏為末豬油調塗活𩺀魚一尾生山藥如魚長一段白糖三錢杵爛塗之土貝母研末陳米調醋敷牛皮膠一兩水熬化入土貝母末五錢攤油紙貼之佛前舊羊角燈底焙存性研末麻油調敷田中螞蟥杵爛圍之即散活蠍一隻麻油一盞浸三日取起曬乾為末以鵝毛蘸油搽上初起者為癧母每日多搽幾次三五日即愈已潰者用牛皮油靴底燒灰麻油調敷麵糊作餅貼於先潰之處再用小砂壺二把俱盛燒酒煎滾去酒以熱壺口復於餅上熏之一壺冷又易一壺如此數次將毒拔盡則愈熏後用豬膽汁熬成膏貼之破爛多年不愈延及胸脅臭穢難聞雖十數載之頑證可用新石灰一塊滴水化開成粉以生桐油調勻乾溼得中先用蔥椒湯洗淨瘡口塗數日即愈牛皮膠四兩牡蠣粉拌炒成珠去粉土貝母八兩共研末水法丸如緑豆大早晚用昆布海藻各一錢五分煎湯吞下三錢不論已破未破均效乳病乳岩土貝母五錢煎服數日可消已破者加胡桃膈銀花連翹各三錢酒水煎服潰爛已久者用雄鼠糞經霜土楝子不用川楝露蜂房各三錢俱煅存性各取淨末和勻每服三錢酒下間二日一服即止痛收口乳癖白芷雄鼠糞等分曝乾為末好酒調服必多飲取一醺睡而愈活𩺀魚一尾鮮山藥如魚長者一段共搗爛敷患處以紙蓋之立愈陳皮炒為末黑糖調和開水送三錢七日而愈蒲公英一兩銀花二兩酒水各一碗煎半碗加酒一小杯服之一醺可愈乳吹砂仁去殼五分冬葵子八分共研末以蒲公英五錢栝蔞仁三錢煎湯調服數日即愈穿山甲三片炒橘紅二錢水煎和酒服立愈甘菊花根葉杵爛酒釀沖服渣敷患處立效乳頭破爛龜板炙研末加冰片研勻麻油調搽寶珠茶花焙研末麻油調敷內服治諸血證婦女諸病陰癢雞肝或豬肝煮熟切一長條插入陰戶內過一夜次早取出數次乃愈陰腫羌活防風煎湯熏洗蔥白研膏入乳香末拌勻敷患處陰寬肥皂子浸去黑皮用其白肉加白及五倍子蛇床子石榴皮甘松山奈龍骨煎濃湯日日熏洗寬而冷者加石硫黃煎陰挺飛礬六兩桃仁一兩五味子雄黃各五錢銅緑四錢末之煉蜜丸每重四錢即以方內雄黃為衣坐入玉門即愈甚者不過二次陰瘡陳蚌殼煅兒茶輕粉飛滑石人中白煅各三錢枯礬龍骨煅各一錢冰片三分共研麻油調搽陰爛煅牡蠣飛滑石各三錢陳蚌殼煅二錢入中白煅一錢龍骨煅錢半冰片二分共研末糝之房後陰痛地榆煮酒服陰傷出血五倍子研末糝之或加血餘黃連白礬灰亦妙或以青布燒灰血餘等分研敷之蛇床子研末綿裹納陰中立效小便不通生白礬末五釐入臍以一指甲水滴之皂角煎湯洗陰戶淋滯淫濁屬於濕熱者淡豆腐漿調六一散服亦治男子淋濁屬於陰虛火動者以生雞子打散淡腐漿沖服亦治勞嗽咳血帶脈虛而不攝者海螵蛸粉魚鰾煮爛搗丸梧子大吞服自愈血崩不止淡腐漿一碗韭菜汁半碗和勻空心服棉花子童便浸一宿為末每一錢側柏葉湯下極效兼治勞嗽吐血調經種子保胎丸白茯苓二兩白朮土炒條芩酒炒香附童便炒延胡醋炒紅花隔紙焙乾益母草淨葉各一兩真沒藥三錢瓦上焙乾去油共研細蜜丸梧子大每日七丸白湯下汛愆者服之自調不孕者服之即娠胎動者服之即安胎滑者服之自固若胎動者每日可服三五次胎滑者有孕即宜配合每日服之勿斷自然無事亦且易生但每次七丸為則不可多服一丸至囑慣於三月小産諸藥不效者日以梅梗三五條緑萼梅樹上者尤良煎濃湯飲復飲龍眼湯甚驗南瓜蒂頻煎渴服催生用荷瓣一張上書一個人字嚼而吞之立産車前子四錢冬葵子三錢炒枳殼二錢白芷一錢多日不下者可煎而服之六一散催生最妙兼下死胎並治熱産惡露不行胎澀不下用鮮豬肉三斤煎清湯吹去浮油恣飲即産生牛膝一兩酒浸杵爛以龍眼肉六兩煎濃汁沖牛膝酒內服之即産過月難産用舊絹篩羅底一個捲筒燒碗內白湯下即産盤腸生以生半夏搐鼻中腸自收橫生以益母草一兩酒煎濃汁和童便一大盞服諸般難産用陳麥稈露天者尤妙一兩洗淨剪寸段煎湯服極效産下子腸帶出切勿剪斷致傷母命以枳殼煎湯熏洗即收胞衣不下生雞子清一枚吞之即下鮮荷葉濃煎服良或用伏龍肝末醋調納臍中死胎不下萆麻仁三粒巴豆仁四粒麝香二分同研成餅貼産門上交骨其胎立下即好胎至足月臨盆久而不下之難産亦可貼而即産但勿用之稍早恐有揠苗之害也伏龍肝一兩研細甘草湯調服冷飲能解諸般中毒産後小便不通陳皮一兩為末溫酒下二錢産後暈絶生半夏末冷水和丸如豆大納鼻中灌以熱童溺薰以炭醋立蘇産後虛弱豆腐漿一碗衝入打散生雞子一枚再加豆腐皮一張龍眼肉十四枚白沙糖一兩同滾透五更空心服蓋産後失調往往延成勞損而貧戶醫藥無資富家每為藥誤特採此方甘平和緩補血滋陰貧富皆宜允為妙劑小兒諸病小兒初生以豬膽汁一枚入湯浴永不生瘡初生無皮泥地上臥一宿即生冬月以白米粉燥撲之候皮生乃止小兒開口不宜太早須生下一周時以大黃黃連生甘草等分泡汁飲數匙然後吃乳初生小兒白膜裹舌或遍舌根可用指甲刮破令血出以燒礬末半緑豆許敷之若不刮破其兒必啞初生小兒兩目紅腫赤爛不開以蚯蚓泥杵塗囟門干則易之三次必愈生南星生大黃等分為末醋調塗兒兩足心雖月外亦可用初生驚風欲死硃砂磨新汲水塗手足心初生小兒便祕一味生大黃泡濃汁飲之小便不通者用清明插檐朝南楊柳枝煎湯服亦治大人溺閉遊風伏龍肝為末雞子清和塗干則易之如治浸淫瘡以豬脂和敷胎毒胎瘡胭脂膽礬黃柏東丹等分研末菜油調搽水邊桕樹根白皮曬研入雄黃末少許生油調搽稀痘法生黃豆生緑豆生白扁豆或黑豆亦可生甘草銀花等分常煮湯代茶飲橄欖核七個打碎去仁曬乾研極細末不可見火勿沾生水再用玉蝶梅花二十一朵去蒂加淨白蜜二茶匙共搗濃交春分時與兒食之永不出痘即出亦不過三粒菾菜俗作甜菜即葵菜一名滑菜一名莙薘一名女菜性滑可浣油膩煮而供蔬食妙小兒能食即以乾柿飯上蒸透嚼飯飼之能稀痘並免疳瀉諸疾免痘法淨銀花一斤生曬研末淨白蜜丸如龍眼大日日與兒服之可不出痘甚驗萆麻仁三十六粒辰砂一錢研爛再入麝香當門子五釐研勻於端午日午時塗小兒百會穴暨心背兩腋曲池委中手足心凡十三處余在宜黃見越人王望沂少府云其家用此法已數世不出痘矣凡居窮鄉僻壤值嬰兒發痘不能迎醫者須於微發熱時用手蘸真麻油摩其背脊下至尻骨如此數次其熱自退痘疹不出以及悶痘不發毒脹滿者此係急證用青蔗漿頻服則痘立起其寒散解毒之功勝白鴿蚯蚓多矣痘發不出頭面腫脹氣喘垂危者徑十足用大蔥頭杵爛放在大銅盆內上用木架架之再以大被單罩蓋停當大人抱定小兒睡在上面然後將沸湯衝入蔥盆內熱氣熏蒸候稍溫即抱出切不可露一絲之風直待汗乾即差悶痧分開頂門有紅筋紅瘰挑破即出痧疹咽喉腫痛不拘初起回後用苦參三錢白殭蠶二錢研細吹入痘出眼內新象牙磨水滴眼內即退兒生母中指上刺血一點滴入眼內即退痘瘡潰爛用青茶葉滾水略泡攤於草紙上以絹蓋之臥兒於上任其展轉即痂痘爛生疽以柳葉鋪而臥之蛆盡出痘毒泡過茶葉曬乾為末五倍子等分雞子清調敷又法生黃豆口中嚼爛塗之不必留頭數次即消極效痘疔青蔗渣曬乾真香油點燒成灰以津液調勻銀簪挑破點之立效諸疳南天竹煎湯頻服蟑螂去頭足翅焙乾與食疳愈則不要食此矣使君子肉二錢雷丸檳榔各一錢黑醜頭末五分俱生曬研末每服三分以雞卵一枚打破空頭內藥紙封飯上蒸熟食之藥完病痊積滯海蜇鳧茈常煮食之兼治大人痰哮及肝乘胃痛浸燒酒飲能消大人胸中痞塊又紹興青腐乳作下飯能消疳積治腹脹身黃驚風鉤藤鉤甘草各五分水煎服驚風人手指甲長寸外者煎湯服開通元寶錢以水磨服少許神效俗讀開元通寶者非按俗謂驚風者即火動風生之瘛瘲也金能制木可息內風國朝康熙通寶錢熙字作正楷從𦣞不仿帖體從丨𦣞作熙者乃平西藏時熔藏中佛相所鑄故世謂之羅漢錢銅色如金俗又呼為金錢愚民往往私毀改為首飾酷似真金蓋其鑄佛之時多雜金寶於銅內也入藥更勝遠駕開通元寶之上小兒瘧疾不能服藥以黃丹五錢生礬三錢胡椒二錢五分麝香五釐共末好醋調敷男左女右手心絹包手掌藥熱汗出而愈一方可效三人未曾食谷之兒久瘧不已濃煎冰糖湯服神效小兒久瀉身熱最危以炒黑松花一錢炒紅曲二錢共研分二服白糖湯調下暑風取淨黃土鋪地上以芭蕉葉為薦臥兒於上飲以益元散鮮竹葉湯調小兒體弱夏月最多此證切勿誤認為驚妄投峻藥癇證俗呼羊癲風用經霜老茶葉一兩明礬五錢為細末水法丸辰砂為衣每三錢開水下三服全愈又方用二陳湯加青皮丹皮石菖蒲辰砂為劑甚效拘攣手足拘攣用草本水楊柳酒煎服鬼箭鬼箭風用野苧麻天南星同搗敷魅惑狐魅以珠蘭花根搗爛塗陰上但此花根有毒勿入藥服狐沾之即死也邪氣蠱惑以鱉甲蒼朮燒之即安又麝香一二兩佩之良二陰諸病便毒以棉地榆四兩穿山甲二片土炒白酒三碗煎一碗空心服雖有膿者亦愈全蠍貫衆生礬等分為末空心調服一錢棉地榆四兩生甘草銀花各一兩白芷三錢皂角刺二錢五分水二碗煎減半空心服胡桃二個連殼杵碎澤蘭白及松羅茶各三錢井水河水各一碗煎取四分和酒服一劑知二三劑愈蔣附治驗陰囊腫痛蔥白乳香搗爛塗之硼砂一分水研塗之棉子仁煎湯洗之萬年青根搗汁熱酒沖服腎囊風雞子黃炒出油搽之陰囊濕腫紫蘇紫背浮萍各一兩水煎熏洗囊瘡作爛六一散四錢赤石脂二錢紫蘇一錢五分兒茶一錢共為末糝之腎囊皮爛龜板炙存性研入冰片少許麻油調塗即愈囊癰初起以獨核肥皂數個用乳香四兩裝入外將濕草紙包煅火須先文後武以煙盡為度出火氣研末每服一錢五分三服即愈疝氣乾荷葉蒂二十一個炒焦海金砂三分好酒一碗煎一滾乘熱服以醉為度即愈雞子殼燒灰為末空心溫酒下二服即愈牛蒡子根葉搗爛絞汁和好酒服之覆被出汗永不再發精滑善遺牽轉白牛法最妙其法不拘布帛做一小兜將外腎兜起拴在腰後褲帶之上此病自免道家謂之張果老倒騎驢或以刺蝟皮焙研黃酒調早服又靈雪丹甘草薄荷甘遂樟腦蘇葉陽起石各三錢共研末碗盛紙糊口細錐紙上密刺小孔另用碟覆碗上碗邊寬餘半指黑豆麵固濟砂鍋底鋪粗砂加水坐碗砂上出水一寸炭火煮五炷香水耗常添熱水香完俟水冷取出入研細麝香少許人乳浸化蟾蜍少許蔥涕官粉煉蜜為丸緑豆大瓷瓶封收用時以唾津在掌上研半丸塗玉麈頭上一時麈頂酥麻便是藥力透徹凡遺泄不止勢在危急者先煉此丹保固腎精於日落時研塗即能祕精一夜不泄再用湯丸調治老年夜多旋溺晚食糯米糍即效若溺時玉莖痛而仍頻數不赤者生黃耆一兩甘草二錢煎服甚者日二服即愈下疳先以大小薊地骨皮煎湯洗淨再用黃柏黃芩官粉珍珠冰片研細敷之立效橄欖燒存性白螺螄殼古泥牆上者浸去泥醋煅各一錢研末加冰片一分研勻麻油調搽濕者糝之須先用甘草花椒湯洗鮮小薊鮮地骨皮各五兩煎濃汁浸之極痛者不數日而愈鮮豨蘞草葉貼之黃花薔薇葉焙研糝之橄欖燒灰研細末糝之二便不通皂角末蔥白連須加麝香二分蜜少許杵貼臍下至毛際再以韭地蚯蚓泥搗和水澄清飲之尤妙坐板瘡松香五錢雄黃一錢五分研細和勻以棉紙包裹拈成條臘月豬脂浸透點火燒著取滴下油搽之立效藤黃搗碎糝在雄豬網油之上以青布一長條卷緊線扎浸菜油內一夜取出火燃取滴下油以杯承之埋土中一宿去火氣塗上即愈甘蔗皮燒存性研麻油調搽臀癰芙蓉葉曬研胡椒焙研各二錢野苧根一兩蔥頭七個酒糟兩許共杵爛加米醋和敷即消脫肛萬年青連根煎湯洗用五倍子末敷之或先以麻油潤之再用風菱殼煎湯洗之鱉頭煅存性研加冰片糝之立收腸風痔血棉花子炒黃黑色去殼為末陳米濃汁加黑沙糖丸如梧子大每晨開水送三錢服三斤斷根生豆腐渣鍋內炒燥為末每服三錢白砂糖湯下日三次遠年垂危者亦效瓜子殼一味煎濃湯服立愈兼治吐血鴉膽子即苦參子已試取囫圇仁每七粒以龍眼肉包之每服三包白湯下重者日三服忌葷酒戒鴨肉兼治休息久痢極效柿餅煅存性研再以煮爛柿餅杵和丸如梧子大仍以柿餅湯下久服神效王道法也久瀉不痊生蔥杵爛入黃丹為丸如豆大填臍中外以膏藥封之陳火腿煅存性研鍋心飯焦各三錢炒松花一錢米糊丸參湯下痢疾肛門腫脹如痔狀冰片研細乳調搽或以木鱉子五倍子共研調敷臁瘡臁瘡白蘆蔔打爛貼患處瘡口上一日一換三日毒血去盡再用松香一兩杏仁三十粒去皮尖細黃丹八錢輕粉五錢舊羊角燈底火焙為末三錢共研極細麻油調搽一日一換數日即痊蔥鹽湯洗淨拭乾馬勃粉敷之良黃蠟白蠟輕粉韶粉乳香等分為末臘月豬板油麻油各半化勻調前藥攤薄油紙貼之兼治血風瘡之久不結痂者先以鹽湯淋洗用帛拭乾後以白糖霜津唾塗敷生豆腐渣捏成餅如瘡之大小先用清茶洗淨絹帛拭乾然後貼上以帛束之一日一換瘡漸小肉漸平而愈亦可貼腳蛀但勿落生水龜板炙爐甘石煅各三錢輕粉二錢冰片一二分共研細末麻油半杯銅銚內熬滾入白蠟黃蠟各二錢溶化離火將凝入前藥末攪勻攤油紙貼患處以蔥椒甘草湯洗一日一換鹿角灰乳香末研勻清油調敷用清涼藥不效者宜之柿葉燒存性同川椒研末搽之生豆腐渣柿餅同搗爛貼患處以帛束之立效黃牛矢曬燥煅黑四兩煙膠末一兩共研少加冰片香油調搽蔣附治驗腳氣附纏足方腳氣俗呼流火以大張海蛇皮包之干則易生煤炭研極細醋調塗之朴硝大黃寒水石牙皂為末雞子清調敷人中黃研細芭蕉根汁調塗蘆蔔煎湯洗之仍以蘆蔔曬乾為末鋪襪內馬前子一個以粗碗底磨水用雞毛掃遍日掃五七次立效兼治痔瘡不論男女濯足宜頻濯時水中宜加入鹽滷一盞終身用之可免一切足疾以滷能去風火濕熱垢濁而潤皮膚舒筋骨真妙法也女子纏足究不知始自何人袁簡齊先生謂濫觴於李後主乃於續齊諧中雲其矯揉造作毒流天下後世是以永墮泥犁之獄誠深惡而痛恨之也然余見北齊刁玉奴云峰山四疏內有規奴雙趾持之而生憐之句則南北朝已有纏足之風袁又云俗有火化其父母之骸以為孝者遂有裹小其女子之足以為慈者敗俗傷風事同一例無如相沿成俗雖我朝之仁政不能革其陋習良可嘆也不得已採李瀕湖本草綱目內閨閣事宜一方於此帙聊紓玉趾之疼易效蓮鉤之式不致呼號慘切免其戕賊成癆惟願仁人廣為傳播用經屢效洵是神方桑根白皮四錢肥皂子浸去黑皮二錢杏仁一錢水五碗新瓶煎至三碗入朴硝五錢乳香一錢封口煎煬置足於上先熏後洗三日一作十餘次後軟若束棉也束時以羅細生白礬末少加白洋糖糝之每於洗足湯中入鹽滷一杯不生足疾且無皮嗇繭之患皆閨閫中祕方也纏足生瘡用甘草湯淨洗以荊芥燒灰研細蔥白汁調搽癬諸癬龍眼核醋磨塗之大黃藤黃雄黃硫黃薑黃等分為細末菜油調塗患處兼治腳上雞眼吃髮癬煨石膏末糖調塗之藜蘆龍膽草浸油搽發或加秋葵花尤妙鵝掌癬豆腐泔水日日頻洗牛皮癬桃樹根白皮同膽礬杵爛敷癜紫白癜風蘆蔔汁調生礬末三錢先以布擦損塗之瘤瘤贅用甘草煎膏筆塗瘤之四圍塗三次另用芫花大戟甘遂等分為末醋調別以筆搽瘤上勿近甘草次日即縮小又以甘草膏塗其外暈三次再搽三末於其中自然漸焦矣血瘤初起以薄棉花剪如瘤子一塊在雞子清內浸濕貼之略干仍以筆蘸雞子清潤之勿斷四五日即消盡痣血痣潰血涓涓不絶諸藥不能止用五靈脂為末糝上即愈大衄九竅及髮根出血不因服毒者名大衄血乃極虛欲脫之證急取泉水一桶燒酒一斤扶病人坐定裸其腿以燒酒淋之俾酒從踝下即滴入水桶內淋訖將其腿浸入桶中其血即止亟令壯年乳婦以乳哺之再用遼東紅旗海參他處者亦可用力較小耳一斤切片焙為末每三錢調服日三次蓋海參能生百脈之血諸補藥之所不能及也禿瘡禿瘡紫蔗皮煅存性研末香油調搽舊羊角燈底瓦上煅存性研麻油調搽鮮蠶豆搗如泥塗之干即易三五次即愈無鮮豆以乾者水泡搗之亦可海螵蛸二兩輕粉一兩松香三兩共研細油調搽腋癰腋癰腰疽用糯米飯乘熱入鹽塊蔥管少許杵極爛如膏貼患處即消多骨疽多骨疽白花芙蓉葉曬乾大黃五倍子各一兩藤黃生礬各三錢麝香冰片各三分共為末米醋調如厚糊塗其四圍留中一頭如豆大以醋用鵝翎掃之若不掃則無效一日夜即內消並治一切癰疽敷之並效惡瘡一切惡瘡無名腫毒用生豆腐渣於砂鍋內焙熱看紅腫處大小量作餅子貼之冷即易以愈為度獨核肥皂生芋艿各一個蔥白七個同搗爛敷之干即易過一周時未成者即散已成者略出膿即愈煙管中油塗之立散兼治蠱膈用油紙攤貼野苧根搗汁醇酒和服渣敷患處露頭蓋被出汗即出膿水而愈雖發背對口亦可治大芋頭生杵爛敷之龍眼核為末水調塗之大黃五錢木鱉土炒三錢共研細末醋調圍之老菱殼燒存性油調塗白礬末熱水調塗臘月煉淨豬板油一斤入白蠟半斤化勻再下好樟腦四兩攪勻瓷器收藏勿令出氣患處先以蔥白花椒甘草豬蹄湯洗淨用無灰棉紙攤膏貼之並治湯火傷及臁瘡濕毒久不愈者神效無比泡過茶葉杵如泥敷之干則以茶汁潤濕抹去再換五六次即愈兼治蛇咬及火燒成瘡腳發背初起甘草鹽滷煎湯洗即消諸瘡潰爛不愈木耳焙乾研末白砂糖等分用溫水調敷縛之神效移毒法移毒法以藤黃銀硃等分醋和敷毒之半圈即移他處出毒退胬法胬肉不退硫黃研細末敷上即退再用泡過茶葉五錢烏梅三個燒存性共研敷之即收口消管法褪管法人手指甲炙黃象牙屑穿山甲炙黃各研細乳香沒藥俱炙硃砂水飛舊羊角燈底須十年外者打碎炒為極細末各三錢合勻再研以黃蠟化和丸如椒大初服五丸次服六丸逐日加一丸服至十日到十一日每日減一丸退至五丸再逐日加一丸加至十四丸仍從五丸服起周而復始每日空心陳酒下管漸褪出褪盡為度殺蟲法一切癰疽金瘡破爛生蛆諸藥不效者用海參切片焙燥研敷蛆皆化黃水流出再用生肌藥收口即愈腋氣羊昷羝腋氣也俗名狐臭又曰肋腥臭一作體氣用大田螺一個巴豆仁一粒膽礬一豆許麝香少許先將螺以水養三日吐去泥土揭起靨入藥於內用線栓住放瓷碗內次日化成水凡用須五更時將藥水以手自抹其兩腋下不住手抹藥直待腹中欲瀉卻住手要揀深遠無人到處空地內出大便黑糞極臭是其驗也以厚土蓋之勿令人知如不盡再抹之又去大便次用枯礬一兩蛤粉五錢樟腦一錢研細擦之以去病根精豬肉兩大片以甘遂末一兩拌之五更時挾腋下至天明以生甘草一兩煎湯飲之良久瀉出穢物須棄野地中恐氣傳人也五次即愈虛弱者間日為之杖丹預備夾棍方用肥皂子水浸透去外黑皮用里白肉並仁杵如泥如明日用事今晚以此敷之上至腳臁脡一節下至腳底板心並指甲內處處敷勻不可有一毫空隙處用油紙包之外用裹腳纏足其藥與皮肉一樣顏色不變雖遭冤抑略無妨礙出來時以黃豆漿溫溫洗之其豆漿須預先一日將豆泡爛磨漿候著用神哉方也夾棍傷一出衙門即用熱童便一盆將足浸之如便冷預燒紅磚二塊淬之即熱直浸至童便面上浮起白油其傷盡出矣不𭼊不疒貢再用肥皂搗如泥雞卵清和塗傷處以草紙包裹腳縛緊一夜不可動即瘥又方豬油四兩胡椒照人一歲一粒搗爛敷上扎好勿洗去並勿解動一夜亦瘥夾傷骨未碎者土牛膝搗敷骨碎者土鱉蟲同活蟹搗敷夾桚杖傷死血鬱結疼痛壞爛命在頃刻用麝香一分冰片三分乳香沒藥各一錢五分樟腦二錢輕粉血竭各三錢共研極細後將黃蠟一兩豬板油一兩二錢同化調藥成膏貼患處晝夜流出惡水即時蘇醒杖丹生豆腐鳳仙花連根葉同杵爛打出敷上干則再易三日全愈桑椹二三斗入瓶內麻布扎口放陰處臭爛過霜後取出榨去渣以小瓶收貯清汁搽上即止痛二次立瘥緑豆粉炒研以雞蛋清和塗止痛玉簪花手搓熟貼杖破處即瘥嫩荷葉貼亦妙鳳仙花葉杵如泥塗腫破處干則易一夜血散而愈冬春須預收乾者研末水和塗之大黃滑石赤石脂等分研細茶湯洗淨糝之如受杖後以蔥頭煮湯揩洗再將松香四兩溶化又將蔥一握搗爛入松香內攪勻攤一膏藥貼患處外以棉帛掩上扎定五六日愈杖傷出蛆真麻油澆之杖丹長肉臘月豬油一斤黃連四兩熬至黃連轉焦色去渣入白蠟黃蠟各二兩收之敷患上帛扎緊自愈血竭白蠟各一錢硃砂輕粉各二錢研粉糝之二日即平杖癬細茶二錢輕粉乳香象牙末各一錢水銀木香各五分麝香少許為細粉雞子黃蠟羊油調搽閃朒諸閃朒或打傷不出血但有青紫內傷者先以蔥白杵爛炒熟將痛處擦遍隨用生大黃研末薑汁調塗儘量飲以好酒雖三月半年者悉效閃腰木香一錢麝香三分共研細右痛吹入左鼻左痛吹右鼻令病手上下之閃頸朒腰硼砂研粉以骨簪蘸唾沾粉點兩目淚出即松三點全愈攣閃傷筋結核腫痛若使成毒最難治療初覺急用火酒燉溫手蘸輕拍患處數百下隨以韭菜杵爛罨一周時次日再拍再奄以瘥為度極效初拍覺疼宜忍之拍久則不疼矣臂膊脫骱生地黃搗如泥攤紙上糝以木香末一層再鋪地黃泥一層貼患處瞽目瞽目重明法淨皮硝六錢鮮桑根白皮二兩以新砂罐河水煎透傾出澄清溫涼洗之少頃又洗每月止洗一次日期列下每日須自早至晚洗十餘遍且須齊戒清心靜養勿動嗔怒勿食韭蒜昏神之物勿犯穢濁焚香向東洗一年病深者洗三年一切目疾皆效洗眼日期正月初五二月初二三月初三四月初九五月初五六月初四七月初三八月初十九月十二十月十二十一月初四十二月初四閏月照前按世俗誤用桑葉洗眼甚至損目方中所用乃桑根白皮切勿誤傳為桑葉也肝胃腹痛肝胃久痛諸藥不效或腹有癥瘕此方皆驗名梅花丸孕婦慎用緑萼梅蕊三兩滑石七兩丹皮四兩制香附二兩甘松蓬莪朮各五錢茯苓三錢五分人參或用參鬚亦可否則用真潞黨參嫩黃耆砂仁益智仁各三錢遠志肉二錢五分山藥木香各一錢五分桔梗一錢甘草七分凡十六味共研細末白蜜十二兩搗丸如龍眼大白蠟封固每服一丸開水調下此方傳自維揚吾鄉沈月枝封翁幕於姑蘇時患心腹久痛諸藥罔瘳得此而愈遂照方配合施送服者多效今高芝檢先生家踵其事求藥者日益廣但用藥甚奇其分兩之多寡亦難測識謹附録之以質博雅腹痛紅棗二枚巴豆三粒同杵爛裹縛臍上立止截瘧膏截瘧膏硃砂胡椒各一兩研極細無聲瓷瓶密貯瘧久者用暖臍膏一張挑藥末一茶匙於膏藥中央勿令四眼見對臍緊貼瘧止勿揭聽其自落神效孕婦忌之藥酒方愈風酒陳海蜇十二兩馬料豆嫩桑枝松針杵爛各四兩醇酒七斤封浸煮炷香喇嘛酒治半身不遂風痹麻木胡桃肉龍眼肉各四兩杞子首烏熟地各一兩白朮當歸川芎牛膝杜仲白芍豨蘞草茯苓丹皮各五錢砂仁烏藥各二錢五分以上用絹袋盛之入瓷瓶內浸醇酒五斤隔水燉濃候冷加滴花燒酒十五斤封貯七日可飲矣宮方定風酒補血息風甚有奇效余於辛丑年視伊協揆之證得證方凡患虛風病者飲之輒愈且藥味平和衰年者頻服極有裨益而無流弊真妙方也但飲貴微醺不可過恣耳天冬麥冬生地熟地川芎五加皮牛膝秦艽各五錢川桂枝三錢絹袋盛之汾酒二十斤淨白蜜赤沙糖陳米醋各一斤攪勻浸以瓷壇豆腐皮封口壓以巨磚安水鍋內蒸三炷香取起埋土中七日可飲矣清和酒不能斷飲之人可用此法庶幾飲而無弊焉直生地八兩天冬四兩銀花八兩生豬脂一斤生緑豆一升耿柿餅一斤切碎汾酒二十斤密封浸之一月後可飲久藏不壞按酒性熱而火酒尤烈故浸酒方忌用辛竄之品以助其虐而世人往往犯之殊不合制惟此四方用藥深有精義洵為可法他如神仙百益百歲之類徒有美名而功不補患幸勿為其所愚也灸火論灸火先當辨證論汪省之曰素難諸書皆言陽氣陷下者脈沉遲也脈證俱見寒在外者冬月陰寒大旺陽明陷入陰水之中者並宜灸之設脈浮者陽氣散於肌表者皆不宜灸丹溪亦曰夏月陽氣盡浮於表今醫灼艾多在夏月寧不犯火逆之戒乎或者因火而生熱脹發黃腰痹咽燥唾血者往往有之尚不知為火逆所致寧甘心於命運所遭悲夫經曰春夏養陽以火養陽安有是理論而至是雖愚亦當有知者焉又夷堅志趙三翁云世人但知灼艾而不知點穴又不審虛實徒受楚痛耗損營液有冷疾者使其仰臥揉艾遍鋪腹上若五六七月間就屋上開穴取日光照射自然氣透臍腹如冬春可用尉斗盛灰火慢尉之皆以患者鼻聞濃艾氣為度宿苛自去按此名天灸功勝灼焫藥筒火針亦宜慎用仁術志有論宜參癆病說附方癆病之因非一總緣情志不舒所謂七情不損五勞不成者真至言也然有藥治病無藥移情故素問云二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息奔者死不治蓋二陽者陽明也陽明為多氣多血之經衝脈隸於此苟心之隱曲不伸脾為思慮所困則鬱火內燔營液暗爍陽明漸涸衝脈乃衰血耗風生汛愆肌削勢必君相二火升騰氣逆奔迫而死也俗謂之乾血癆惟室女尼姑婢女最多患此孟子曰女子生而願為之有家誠以飲食男女人之大欲存焉奈何為人父母與主人者之不曲體人情也若能稱家有無不攀富貴遂其所願嫁不失時何至玉折蘭摧噬臍莫及耶而富貴之家逸居無教輒以小說演義諸書為解悶消閒之事佳人才子誘掖成癆尤易易也婢女雖非我生尤當曲加憐憫忍心久錮決裂堪虞更有鄉愚為人所誑每將幼女送入空門拂性遠情慘同桎梏良可悼也世人不察但疑今人元氣日薄故多勞損不知古今元氣不甚相殊七十古來稀匪由今日始而人多癆病實系乎茲惟望有覺世牖民之責者嚴禁傳奇小說毋許鄉民幼年出家庶可肉白骨於香閨濟紅顏於壽域洵造無涯之陰德豈徒有關於風化而已哉虛癆欲火甘梨汁胡桃肉研各一斤芽茶五兩懷生地當歸末各六錢熬至滴水成珠入雞子清一枚貯瓷器內封口勿令出氣冷水浸去火毒每晨服一匙慎疾法飢飽勞逸皆能致疾而飽暖二字尤為釀病之原故神農氏播谷之餘即收藥味有熊氏垂裳之際聿著方書周公贊易於頤卦以慎言語節飲食二者為養身之切務古樂府云晚飯少吃口活到九十九放翁詩云多壽只緣餐飯少釋氏有過午不食之戒寓意草亦極言少食為養脾之妙法諺有之曰禍從口出病從口入蓋肥甘過度每發癰疽酒肉充腸必滋穢濁熏蒸為火凝聚成痰汨沒性靈變生疾病凡遇時疫流行之際更為召疾之媒苟臟腑清虛素甘淡泊氣機不為濁壅邪氣不能逼留雖感六淫易於解散惟內濁既甚疫氣易招同類相求如膠入漆治之費力死者恆多慎疾之人毋貪口腹至於勞逸之論莫詳於魯敬姜勞力者恆享太平逸惰者常多疾疚後人無識改為飢飽勞役不但文理不通亦且僅知有勞傷之病而不知有逸欲之病矣噫此溫補之門所以日開而炎黃之道所以日晦歟抑何陋哉治疫方闢疫方以枇杷葉拭去毛淨鍋炒香錫瓶收貯泡湯常飲取其芳香不燥不為穢濁所侵能免夏秋一切時病若別藥恐滋流弊方名雖美概弗輕試而薄滋味遠酒色尤為先務外以諸葛行軍散搐鼻可闢尸穢惡氣食井中宜入白礬雄黃水缸內以菖蒲根浸之室內頻用大黃焚之此外皆屬異端不必惑也普濟解疫丹治濕溫時疫之主方也六元正紀五運分步春分後交二運火旺天乃漸熱芒種後交三運土旺地乃漸濕濕熱之氣上騰烈日之暑下爍人在氣交之中受其蒸淫邪由口鼻皮毛而入留而不去乃成溫熱暑疫之病則為發熱倦怠胸悶腹脹肢痠咽腫斑疹身黃頤腫口渴溺赤便祕吐瀉瘧痢淋濁瘡瘍等證但看病人舌苔淡白或厚膩或干黃者是暑濕熱疫之邪尚在氣分悉以此丹治之立效醫家臨證亦當准此化裁自可十全為上方用飛滑石十五兩茵陳十一兩淡黃芩十兩石菖蒲六兩貝母木通各五兩藿香連翹射干薄荷葉白豆蔻各四兩凡十一味不可加減生曬研細末每服三錢開水調下日二次或以神麯糊丸如彈子大開水化服亦可神犀丹專治溫熱暑疫諸病邪不即解耗液傷營逆傳內陷痙厥昏狂譫語發斑等證但看病人舌色干光或紫絳或圓硬或黑苔皆以此丹救之若初病即覺神情躁亂而舌赤口乾者是溫暑直入營分酷熱之時陰虛之體及新産婦人最易患此急須用此多可挽回切勿拘泥日數誤投別藥以僨事也兼治痘麻毒重夾帶紫斑及麻痘後餘毒內熾口糜咽腐目赤神煩瘛瘲等證但溫暑直入之證告危甚速竟有延醫不及之憾況方中犀角鎊而煎之味極難出磨則需時緩不及待亦且價昂非貧苦人所能猝辦惟望濟世為懷者預將此丹配合施送則患者易於得藥救活必多貧人亦可重生豈非陰德更望存心之藥鋪誠合出售僅取工本獨於此丹不取利亦不費錢之功德也方用烏犀尖磨汁石菖蒲黃芩各六兩直生地冷水洗淨浸透搗絞汁銀花如有鮮者搗汁用尤良各一斤糞清連翹各十兩板蘭根九兩淡豆豉八兩元參七兩紫草花粉各四兩凡十二味不可加減生曬研細以犀角地黃汁糞清和搗為丸切勿加蜜銀花如有鮮者亦絞汁和入如汁少難丸可將淡豆豉煮爛如無糞清可用人中黃四兩研入如無板藍根以飛淨青黛代之每丸重三錢用涼開水調服小兒用半丸玉樞丹一名解毒萬病丹俗名紫金錠治諸中毒諸癰疽五絶時疫喉風障氣水土不服蛇犬蟲傷尸疰鬼胎顛狂驚忤百般惡證山慈菰去皮洗淨焙川文蛤即五倍子槌破洗刮內桴千金子淨霜各二兩紅芽大戟洗焙一兩麝香三錢各研細和勻糯米粥為劑每料分四十粒於辰日淨室中木臼中杵數百下再加硃砂雄黃各五錢名紫金片尤良解鴉片鴉片者云用噶喇吧鴉土所造故又謂之土或作阿片亞片者音之轉也産自外洋倭國故曰洋烟又曰倭煙彼處名為合甫融而有烏土白皮紅皮三種烏土為上彼處稱為公班故有烏煙之名內有罌粟花之脂漿芙蓉葵花云亦可造台州福建亦有所産故有阿芙蓉葵漿臺漿建漿等號京師稱曰大煙所以別於尋常烟草也溫臺人稱曰烟酒言其能如酒之醉人也俗謂之掗騙煙不僅諧聲也蓋彼外國法禁甚嚴無一人敢吸此煙者專掗賣於中國而騙銀易土蠱惑愚人緣此煙吸入頃刻能遍一身諸藥無其迅速氣主宣升精神隨以上湧升提日久根蒂日虛煙癮日深銀錢日少必至傾家廢業絶嗣喪身而後已五十年來天下之蒙其害者人所共聞王子壽所謂挾無形之鴆毒爍九州之膏血開尾閭之大壑蕩四民之筐篋者是也故余目之為妖煙云其性甚熱最爍陰津妄人誤以為寒余於回春録中曾詳辨之其生土與未經火煉之煙膏毒性尤烈服之昏躁氣絶甚至殺人惟濃煎甘草汁或金汁可以解之生南瓜搗汁服亦良同酒服者難救同醋服者尤不易救火上煉過者毒較緩向不吸此者誤服亦能殺人粳米加水搗絞濃汁可救吸烟醉者陳豆醬泡湯解之醬油泡湯亦可吸烟成癮者用甘草一味熬膏調入煙中吸食二三日即漸不欲吸矣方簡價廉又不損人且無後患極深之痛一月可斷但必痛悔堅心無不神效並望廣為傳播俾海內煙癮全除豈非大幸又凡煙癮戒斷一二年內多食南瓜永無後患勸醫說三則勸醫說黃退奄曰每見有名醫家不數年間必獲厚資其間實緣得當而愈人者固多僥幸而得者亦復不少宜修合良藥以施貧苦疏財帛以行利人利物之事則天亦原其情而賜其福也莫謂我道勝人分應坐享求田問舍以傳子孫墓木未拱已有資産廢棄者比比也何如早行善事以為綿遠之計耶曲禮云醫不三世不服其藥俗以世業相承為解實不然也橘旁雜著言醫必父而子子而孫如是則其業精始服其藥若傳至曾玄更為名醫矣其間賢者不待言其不肖者奈何因其世業而安心服其藥設為所誤生死攸關雖愚者不為也況醫道通乎仙道遠數十百年偶出一豪傑之士聰明好學貫微徹幽然其上世並非醫者舍是人而必求所謂三世者有是理乎漢儒謂神農本草黃帝素問玄女脈訣為三世醫書醫必讀之方為有本之學也梁芷林中丞云古之醫師必通於三世之書一曰神農本草二曰靈樞針灸三曰素問脈訣脈訣可以察證針灸所以去疾本草所以辨藥非是三者不可以言醫注疏甚明若必云三世相承然後可服其藥將祖父二世行醫終無服其藥者矣又沈歸愚葉香岩傳云先生臨沒誡其子曰醫可為而不可為必天資敏悟又讀萬卷書而後可借術以濟世不然鮮有不殺人者是以藥餌為刀刃也吾死子孫慎毋輕言醫嗚呼可謂達且仁矣噫今之藉祖父聲名而不學無術者可不鑑哉為醫者非博極群書不可第有學無識雖博而不知反約則書不為我用我反為書所縛矣泥古者愚其與不學無術者相去幾何哉故柯氏有讀書無眼遂致病人無命之嘆夫人非書不通猶人非飯不活也然食而化雖少吃亦長精神食而不化雖多吃徒增疾病所以讀書要識力始能有用吃飯要健運始能有益奈毫無識力之人狃於如菜作齏之語涉獵一書即爾懸壺應世且自誇曰儒理喻氏所謂業醫者愈衆而醫學愈荒醫品愈陋不求道之明但求道之行此猶勉強吃飯縱不停食而即死亦為善食而形消黃玉揪比諸酷吏蝗螟良不誣也更有文理全無止記幾個成方遂傳衣鉢而世其家業草菅人命恬不為羞尤可鄙矣語云用藥如用兵善用兵者嶽忠武以八百人破楊麼十萬不善用兵者趙括以二十萬人受坑於長平噫是非才學識三長兼具之豪傑斷不可以為醫也父兄之為子弟擇術者尚其察諸穩婆說穩婆說按難産自古有之莊公寤生載於左傳故先生如達不坼不副詩人以為異徵然先生難而後生易理之常也晚嫁者尤可必焉第亦有雖晚嫁而初産不難者非晚嫁而初産雖易繼産反難者或頻産皆易間有一次為難者有一生所産皆易一生所産皆難者此或由稟賦之不齊或由人事之所召未可以一例論也諺云十個孩兒十樣生洵至言也但得兒身順下縱稽時日不必驚惶安心靜俟可耳會稽施圃生茂才誕時其母産十三日而始下母子皆無恙世俗不知此理稍覺不易先自慌張近有凶惡穩婆隨身攜帶凶器故為恫嚇使人不得不從其策要取重酬操刃臠生索謝去後産母旋以告殞者有之從此成病者有之奈貿貿者不知墮其術中翻豔稱其手法忍心害理慘莫慘於此矣設果胎不能下自有因證圖治諸方即胎死腹中亦有可下之藥自古方書未聞有臠割之刑加諸投生之嬰兒者惟騾形之女交骨如環不能開坼者俗名鎖子骨能受孕而不能娩如懷妊必以産厄亡此乃異稟千萬人中不得其一二者如尋常可開之交骨斷無不能娩之理也方書五種不孕之所謂螺者即騾字之訛也蓋驢馬交而生騾純牝無牡其交骨如環無瑞不交不孕稟乎純陰性極馴良而善走勝於驢馬然亦馬之屬也故易曰坤為馬行地無疆利牝馬之貞皆取象於此之謂也人賦此形而不能安其貞則厄於娩矣施秋濤室兩次難産一女一子並遭臠割聞余說方疑其室之騾形也而適有孕臨月産一男竟無恙始悟前此受穩婆之愚而噬臍莫及也救荒法救荒法按邱文莊公曰荒歲之民桂薪玉粒吸水餐霞牂羊墳首水靜星光業藝者技無所施營運者貨無所售典質則富室無財舉貨則上戶乏力魚蝦螺蚌索取已竭草根木子掘取又空面皆飢色身似鬼形棄男鬻女忍割心腸乞之不足又顧而他輾轉號呼曳衰匍匐氣息奄奄須臾不保或垂亡於茅舍或積尸於道途當此之時非用方術難以度此厄然救飢辟穀之方貴乎簡易而荒誕不經之藥流弊反多茲以平淡而有效驗者録之幸勿哂其譾陋也馬料豆淘蒸極透曬乾如是三次九次更妙為粉柿餅煮爛去蒂核與豆等分搗丸如雞子大每服一丸不用湯水細嚼以津液咽下既能耐飢且又滋補脾腎更可任吃粥飯遠行攜帶亦可代糧黃豆七斗脂麻三斗水淘淨即蒸不可久浸恐減其力蒸過即曬曬乾去殼再蒸再曬共三次搗極熟丸如胡桃大每服一丸可三日不飢此方所費不多一料可濟萬人糯米一斗淘淨百蒸百曬為末每食以開水調之服至一月可以一年不飢脂麻糯米各三升紅棗肉三斤焙燥磨末蜜丸彈子大每一丸白湯下可耐一日飢久服不餓守山糧有心有力者宜預為製造以備荒歉用堅實蘆蔔不拘紅白洗淨蒸熟俟半乾搗爛再以糯米舂白浸透蒸飯搗如糊二物等分合杵勻泥竹壁上待其自干愈久愈堅不蛀不爛如遇荒年鑿下掌大一塊可煮成稀粥一大鍋食之耐飢或做成土坯式砌牆亦可以上諸方價廉物易諸無所忌別無所損既平淡而又神妙惟願仁人廣為傳播焉又周臺公曰兵荒有警每每開倉發賑此自是良有司事而賑之無法則好胥作弊百姓不能沾其實恩若聽其糶買則豪右冒充窮戶糴歸私倉貧民不能蒙其實惠此從來積弊也宜擇各坊寬敞寺觀照僧家施粥例先令本坊窮戶預報花名造成一冊約計人數若干每日應用米若干煮為脫粟聽其就食男女有班都圖有界越坊覓食者誅男女混亂者誅庶幾粒粒皆果貧民之腹官府又無浪費之擾其稍能自存者又恥來隨衆就食較之聽民糴買滋弊萬端大相懸絶夫貧民得食則反側潛銷而富家豪族皆可藉手安枕矣按道光己酉年浙省大水奇荒吾杭紳富捐資開設粥廠數十所僅取半值貧民賴以存活閭閻得以安堵今年春粵匪滋事江南失守吾杭貧民失業洶洶欲逞亦賴粥廠以安此等善舉洵堪垂法於後世也臺公又曰兵荒交警貧富百姓自宜有無相通然而不肯捐助分文者無非欲保其資財而與妻子共享富貴也不知飢寒百姓死亡切身甘心應賊導為摽掠則洞房曲室非己所有賊得焚之朱提白鏹非己所有賊得卷之粉白黛緑嬌妻美妾非己所有賊得淫之牽衣執袂桂子蘭孫非己所有賊得戟之肢體髮膚並非己有刀俎惟賊截解惟賊祖宗邱塞並非己有發掘惟賊剖戮惟賊皆由不能散財之故耳余所以苦口勸輸者正為富貴之家保全性命豈區區勸有餘補不足已哉按富貴二字不易享受須以學問識見駕馭之用所不當用則為敗家子用其所當用不作守財虜苟不知此徒積金錢為子孫計則多藏厚亡悔何及耶臺公藥石之言的是富貴保全性命之簡效良方也救火策救火要策凡人煙稠密之地最慮火患專恃取水近便庶易潑救然亢旱之時河井幹涸苟非預籌注水之法將何以杜剝廬之災乾隆間揚州余君觀德創設水倉法美意良洵善策也其法凡人煙稠密距河稍遠之區買屋基一所前設門楹榜曰水倉中為大院置大缸百十隻滿貯以水嚴冬慮缸凍裂每缸內入以粗松柴一根另用稻稈結為缸蓋冒之復置水桶百十隻水龍數具外鐍以鎖設有火患開取救滅極為簡易附録此帙冀各處仿而行之吾杭素多火患雖有官水缸之設不但缸少而貯水不多且無扃閉居民傾潑土苴久則缸碎而水無存矣亟宜效法是所望也至泰西水法所論水庫及作井造次諸法無不精妙茲不備載續寡欲說寡欲說沈芊緑雲男女居室雖生人之大倫為聖王所不能禁然必行之有節則陰陽和而孕育易若淫欲無度則精傷氣餒神散血枯由是而潮熱而骨蒸而枯槁而羸瘦而尪怯變生種種年壽日促矣若夫豔冶當前姣嬈在側情投意洽頓起淫心因而云雨綢繆真精施泄雖此身殆斃有所勿顧即不然或蓬婆相對村醜相臨未免有情因諧魚水甚至三妻四妾居室纏綿衾枕言歡匪朝伊夕更有捐茲閨閣戀彼龍陽有美孌童心如膠漆要皆實有其事確有其人興之所到情之所鍾所謂一旦相依誰能遣此者獨可異者既無彼美終鮮狂且形不必其相遇目不必其相接忽然而心動忽然而火熾獨居無偶宛如有女同衾握手為歡不啻伊人在御直身頓足筋脈都搖而且火則屏而上炎精則罄而就下其為傷損較之實有其事確有其人者為尤甚焉矣則其精氣神有不歸於竭者哉所以婚嫁貴及時也余惺齊云周慎齊謂酒是邪陽色亦邪陽邪陽勝則正陽衰誠至言也凡人逞欲藉酒為助自覺陽強可喜不知仍靠命門真陽作主欲既遂而邪陽息真陽始寧欲火頻起頻息真陽必漸用漸衰或欲起而勿遂其欲似與真陽無損然如燈火本明而於燈下另添一火以逼之此火漸旺則燈火漸滅理更可悟凡服壯陽熱藥皆同此理尊生者總以泊然不起欲火為妙也杜癆方杜癆方專治骨蒸癆熱羸弱神疲腰脊痠疼四肢痿軟遺精吐血咳逆嗽痰一切陰虛火動之證輕者二三料全愈重者四五料除根若先天不足之人不論男女未病先服漸可強壯常服更妙以其性味中和久任亦無偏勝之弊屢收奇效勿以平淡而忽之方用枇杷葉五十六片刷去毛鮮者尤良咳甚者加多不咳勿用紅蓮子四兩不去心皮梨二枚大而味甘者良去心皮切片大棗八兩同煮熟後去皮煉白蜜一兩便燥多加溏瀉勿用先將枇杷葉放沙鍋內甜水煎極透去渣以絹瀝取清汁後將果蜜同拌入鍋鋪平以枇杷葉汁淹之不咳者但以甜水淹之蓋好煮半炷香翻轉再煮半炷香收瓷罐內每日隨意溫熱連汁食之冬月可多制夏須逐日製小料也咳嗽多痰加真川貝母一兩研極細起鍋時加入滾一二沸即收吐血加藕節搗汁同煮成方弊成方弊執一定之成方治萬人之活病厥弊大矣昔東坡先生誤信聖散子而作序流傳後人被其害者不可勝紀續醫說載宏治癸丑吳中大疫邑侯孫磬修合聖散子遍施街衢服者十無一生原孫侯之意本欲活人殊不知方中有附子麻黃良薑萸蔻藿香等藥皆性味燥熱反助火邪殺人利於刀劍也奈今人偏信乩士之言請鸞定方合藥施送往往亦蹈此弊孔子曰好仁不好學其此之謂乎故是編於解疫神犀二方外不多録者固由疏漏亦敬慎之意也蓋外治單方凡效驗者亟當傳布若內證則病異其因人殊其體投劑極宜詳審設非王道之方平和之藥斷勿輕信妄傳誤人性命苟廣此說以告人亦仁者之一端也若夫世俗相沿如外感之五虎湯瘧疾之柴胡薑棗湯臨盆之催生丹産後之生化湯麻疹之西河柳此物性同麻黃故繆氏每與石膏並用殊有奇功若獨用則大誤也櫻桃核痘科外科之桑蟲蜈蚣之類皆人受其害而習焉未察者更有飽暖之家無病服藥如六味丸八味丸全鹿丸歸脾十全及壯陽種子等方滋弊尤深不勝縷述聊引其概智者慎之辨指南十六條徐洄溪所批葉案頗有可議處如雲肝為剛臟未知何出余謂肺稟堅金之性而體反虛浮肝稟柔木之性而體反沉實故肺養其嬌易遭侵克肝憑其悍每肆欺凌是以肺稱嬌臟肝為剛臟批青果汁法丸為杜撰余按古方丸劑多用蜜為其味同甘草有協和諸藥之功不拘何證似可通融且質黏易於凝合遂相習成風千篇一律而不知蜜之為言密也密者祕也固也故蜂王出入滾成珠團醞釀之所不容人窺何祕如之蓄奇香者以蜜養之而其氣不泄鼎俎家蒸玉面貍與黃雀必先塗以蜜雖沸爍而其膏不走固之道也且味純甘而性極緩故惟峻藥欲其緩脾藥欲其守者始為合法否則欲補下者有戀中之弊欲運中者有鈍膩之偏欲宣經隧者嫌固欲開沉錮者嫌祕自當各因其用而隨時制宜也青果即橄欖色青而味酸微甘用於此證則清膽息風蠲痰充液莫云杜撰深有巧思觸類而通慎毋泥古批陰傷及陽為古無此語余曰即下損及中之謂耳批肝陽吸其腎陰為無此病證余謂肝陽熾而暗吸腎陰猶之乎鐙炷大則膏易竭子盜母氣理所必然患此者多可云無此病證耶批海參淡菜為開後人亂道之弊余謂海參肖男陽功並蓯蓉淡菜類女陰性同烏鰂古方雖未採用而鮑魚雀卵素問已作濫觴但氣味腥咸非胃所喜況究為食品宜充虛人之饌入藥力甚緩而海參更有釀痰滑利之弊中虛少運者勿食也批下損過中難治為非越人語余按此即難經論至脈從上下之謂也雖語不如是而義則同批王先生即晉三余謂殊無的據又按晉三著古方選注於雍正九年葉氏暨其高弟陸禹川吳正功為之校讎而香岩沒於乾隆十年或謂葉氏曾從晉三學則洄溪何以不言而選注中亦無門人之稱合諸書觀之則晉三於葉氏為前輩耳非師生也批噫即厄逆病者最忌噯為飽食氣非病也何可併為一證余按噫於其切音醫痛傷之聲又於介切飽食息也莊子大塊噫氣俗作暖編書者以噫噯名篇於義實贅昧者讀噫為如字固不足論徐氏誤作二證殊失考也況噫有不因飽食而作者亦病也仲聖立旋覆代赭湯治病後噫氣徐氏誤噫為噦謂即厄逆蓋此湯原可推廣而用凡嘔吐厄逆之屬中虛寒飲為病者皆可治也余嘗以治噫氣頻年者數人投之輒愈益見徐氏之僅泥為飽食氣者為末當也批肺痹門所列喘咳諸病謂非經義余按內經以秋遇此者為皮痹皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也又云肺痹者煩滿喘而嘔蓋痹音祕閉塞不通之謂也外感之邪初著於皮毛漸舍於肺則治節不行而為煩滿喘嘔也雖經言風寒濕三氣雜至合而為痹而暑燥二氣亦何嘗不侵肺而為痹乎所以病機之諸氣膹郁諸痿喘嘔喻氏謂即生氣通天論秋傷於燥之注腳則喘咳氣逆之隸於肺痹亦不為謬惟前列腸痹門乃便閉之治從開上者考之經文腸痹者數飲而出不得中氣喘爭時發飧泄注謂腸痹者兼大小腸而言腸間病痹則下焦之氣不化故雖數飲而水不得出水不出則本末俱病故與中氣喘爭蓋其清濁不分故時發飧泄然則腸痹者乃小溲不通而大便滑泄上兼喘渴之病也編書者以腸痹與大便閉同類殊乖經旨批厄門謂仲景治此以旋覆代赭湯為主方余按病深者其聲噦說文噦氣忤也玉篇逆氣也即俗云厄忒也洄溪誤以為噫智者之一失也又謂病者所最忌是但知下虛沖逆吸氣不入之厄矣然實證亦有之痰阻清陽者宜開胃火上衝者宜清肝氣怫鬱者宜疏府氣祕塞者宜通即平人亦有偶患者但啜熱飲或取嚏即愈豈可專借重一旋覆代赭湯哉批此編獨闕傷寒一門余按香岩有評點陶氏全生集一書嘗引其大父紫帆先生暨乃翁陽生先生令兄又凡先生諸議論則其家學淵源於傷寒論金匱要略二書必深討究所以仲聖諸方咸能隨證化裁第傷寒者外感之總稱也惟其明乎傷寒之理始能達乎傷寒之變變者何溫也熱也暑也濕也四者在難經皆謂之傷寒仲聖因之而著論而治法懸殊後人不解遂將四時之感一以麻黃桂枝等法施之自詡恪遵聖法其如與病刺謬何間有一二明哲識為溫證奈為傷寒二字束縛左枝右梧不能別開生面獨葉氏悟超象外善體病情世之所謂傷寒大率皆為溫熱一掃從前錮習如撥雲霧而見青天從劉氏之三焦分深淺於營衛當變而變其相傳者心也當變而不變其拘守者跡也然則善學仲聖者莫如香岩矣批龍薈通便不如脾約丸余謂蘆薈入煎劑固非所宜若龍薈丸大泄風陽直折肝膽二經逆升之火頗有妙用與脾約證大有分別何可相提並論耶批省頭草為蘭乃葉氏之臆說余按蘭為何蘭古無所考寇宗奭朱丹溪皆以為山蘭李東璧引衆說以譏之而據方虛谷之說是謂省頭草後此修本草者服其淹博無不遵之雖劉氏述盧氏乘雅倪氏匯言皆稱善本亦無異議惟汪訒庵頗疑町畦賤品不副雅名洄溪之論諒亦本此豈可謂為香岩之臆見乎道光間武進鄒潤安本經續疏始辨定為山蘭葉余謂山蘭葉以清逸勝功並竹茹省頭草以猛烈勝略同草蔻臨證施用各有所宜也批瘧門不以小柴胡為主方是背仲聖余謂瘧不離乎少陽小柴胡湯是專方今古相傳誰不知之然此但論傷寒之正瘧也若溫熱暑濕之邪雖已化瘧總當以感證之法治之邵新甫言之詳矣設拘守其跡不知變通而執死法以限生人惡足以言醫耶批熱入血室不用柴胡湯為視之如仇云云余謂溫熱病熱入血室不與傷寒同例女科輯要內堯封治驗可證徐氏之論虛癆也力辨建中不可輕試蓋誠知古今病證之有同異矣豈亦視之如仇專與相背抑曾誤用抱疚而畏之如虎乎友漁齊醫話云香岩論溫暑雖宗河間而用方工細可謂青出於蘭但欲讀其書者須先將仲景以下諸家之說用過功夫然後探究葉氏方意所從來庶不為無根之萍也古今醫案云指南全部亦僅數年之醫案豈足概葉氏之一生自刊行以來沾溉後學被其惠者良多而枵腹之輩又藉此書易於剿襲每遇一證即鈔其詞句之精華及藥方之纖巧而平穩者録以應酬竟可懸壺無論大部醫書畏如望洋即小部醫書亦束之高閣惟奉指南樂其簡便而不知學之日益淺陋也嗟乎豈指南誤人耶抑人誤指南耶論續名醫類案魏氏續類案提要病其蕪雜潦草如腳門載張文定患腳疾道人與緑豆兩粒而愈一條謂斷非常食之緑豆余按此特緑豆下脫一大字耳蓋言得藥如緑豆大兩粒與蟲門浦南人一案正相似也然究不知其為何藥如腫脹門邱汝誠案目門周漢卿案之類共有十餘條皆不必選者至於語怪不止接首回生也如邪祟門金劍鋒子蔡石戶章安鎮諸案及元載挑酒魔蓬頭驅癆蟲之類皆可從刪重出之案亦有十餘條且有自注未選入而仍編入者其脫簡舛訛尤難僕數而附載己案多不注明直至三十六卷産後顛狂條始標姓字況卷首無序無目顯為草創之初稿而未經刪定之書也余悉點出併為補目楊素園大令意欲付梓而為時事所阻爰附其略於此以俟大雅教我溫熱經緯論暑略余纂溫熱經緯一書詳辨溫熱暑濕之異於正傷寒因古人但以寒為肅殺之氣而於暑熱甚略也然嚴寒易御酷暑難消熱地如爐傷人最速按徐後山柳崖外編云乾隆甲子五六月間都城大暑冰至五百文一斤熱死者無算九門出櫬日至千餘又余師愚疫疹一得云乾隆戊子丙午壬子癸丑等年暑疫流行率用大劑石膏救全不少紀文達公云乾隆癸丑京師大疫以景嶽法治者多死以又可法治者亦不驗馮星實姬人呼吸將絶桐城醫士投大劑石膏藥應手而痊踵其法者活人無算蓋即師愚也道光間毗陵莊制亭重刻其書余已採入經緯而卷帙稍繁未能授梓且辨證處方非精於醫者不可今附暑疫大略於通俗方書庶世人咸知暑患之烈而醫家治疫亦勿徒守又可之法為至當也若王豫中太史白田集內謂承氣白虎孰非為即病之傷寒設豈可以治溫暑噫太史雖深究於理學殆未深究於醫學乎至石膏辨云目擊受石膏之害者甚多深以繆仲淳袁體庵為不可法是亦書生之見也夫停食不消因而致死者多矣豈可歸罪於五穀以為神農后稷作俑而令天下之人辟穀耶況物性中和莫如谷矣而霍亂痧脹一口米湯下咽即難救治故一病有一病之宜忌不可舍病而但以藥之純駁為良毒也補偏救弊隨時而中貴於醫者之識病耳先議病後議藥中病即是良藥況石膏無毒甘淡而寒善解暑火燥熱無形之氣凡大熱大渴大汗之證不能捨此以圖功若兼胸悶腹脹者須加辛通開泄之品以佐之第讀書以明理明理以致用苟食而不化則粗庸偏謬貽害無窮非獨石膏為然矣搢紳先生博覽之餘往往涉獵岐黃家言或筆之於書或參贊戚友之病世人因信其知儒遂並信其知醫孰知紙上談兵誤人不淺呂晚村是其尤者也安得如徐洄溪者一一而砭之哉又按內經云在天為熱在地為火其性為暑又云歲火太過炎暑流行蓋暑為日氣其字從日曰炎暑曰酷暑皆指烈日之氣而言也夏至後有小暑大暑冬至後有小寒大寒是暑即熱也寒即冷也故寒字從冰冰為水氣陰陽對待乃大地間顯明易知之事並無深微難測之理而從來歧說偏多誤人不淺更有調停其說者強以動靜分之夫動靜惟人豈能使天上之暑氣隨人而判別乎又有妄合濕熱二氣為暑者則亢旱之年河井皆涸禾苗枯槁濕氣全無可以謂之非暑耶況濕無定位分旺四季暑與濕固易兼感而風濕寒濕無不可兼若云濕與熱合始名為暑然則合於風合於寒又將何名乎且二氣兼感者多矣如風與寒最易合而仲聖嚴分桂枝麻黃之異治豈暑與濕而可不為分別哉故治暑者須知暑為火熱之邪然必審其有無兼濕而隨證用藥庶不誤人急暑證治附方三則急暑證中暑昏迷病名暑厥多在旱亢酷熱之時因吸受暑毒直入心包營分耳蓋暑為火邪心為火臟同氣相求不比別邪必由他經傳入也故告危極速往往不及延醫診治世人但知為痧夫痧者即客邪驟入阻塞其氣血流行之道也阻塞經氣腑氣者為淺阻塞臟氣者為深惟暑為陽邪直犯神明之臟殺人最烈而諸般治痧丹丸類多燥烈之藥皆治貪涼飲冷過度而寒濕為病者之方也設誤服之如火益熱以致死後渾身青紫或發斑或口鼻流血凡小兒産婦患此者俗皆誤作驚風治之無不枉死聞之慘然今將救治方法備録於此惟藥品珍貴購覓匪易若好善之家依方預為修合則病者易於得藥貧人亦可重生功莫大焉外則用銀針刺病人曲池臂灣委中膝灣去毒血再將其口撐開看舌底有黑筋三股男左女右用竹箸嵌瓷鋒刺出惡血一點更將其發解散細看如有赤發急拔去之再看其背上如有發毛數莖必盡撥之宜臥清涼之地忌飲薑湯米湯及一切熱湯若其舌苔或黃或白者急以行軍散或紅靈丹灌之立蘇如舌色紫絳或苔黑者暑毒更重也急以紫雪灌之灌後不甚爽慧者營分暑熱未清也再灌之或以神犀丹繼之亦可口渴用生藕汁及清童便飲之或以竹葉緑豆等湯涼飲行軍散治暑熱直中頭目眩暈昏不知人心腹痞滿絞腸痧脹及山嵐障厲道途穢惡一切不正之氣涼水調服三五分兼治口瘡喉痛並點治眼目風熱翳障搐鼻能闢疫癘之邪西牛黃麝香當門子真珠梅花冰片蓬砂各一錢明雄黃八錢水飛火硝三分飛真金二十頁各藥另碾俱令極細如粉再合研和勻瓷瓶密貯以蠟封之絳雪一名八寶紅靈丹治證如前辰砂水飛馬牙硝各一兩明雄黃水飛蓬砂各六錢煅礞石四錢梅花冰片麝香當門子各三錢飛真金五十頁上藥擇吉日乾淨室中各研極細末瓷瓶收貯熔蠟封口勿使泄氣每服一分涼開水灌下小兒減半紫雪治暑火溫熱障疫毒厲諸邪直犯心經猝死及溫瘧煩熱發斑狂易叫走五尸五疰痧脹穢毒心腹㽲痛急黃蠱毒鬼魅驚癰麻痘火閉口舌生瘡一切邪火毒火穿經入臟蘊伏深沉無藥可治之證黃金百兩寒水石磁石石膏滑石各三斤以上並搗碎用水一斤煮至四斗去滓入下藥羚羊角屑犀角屑青木香沉香各五斤丁香一兩洄溪云可用二兩元參升麻各一斤炙甘草八兩以上入前藥汁中再煮取一斗五升去渣入下藥朴硝十斤硝石四斤洄溪云二硝宜用十分之一二味入前藥汁中微火上煎柳木篦攪不住手候有七升投在木盆中半日欲凝入下藥麝香當門子一兩二錢五分硃砂三兩二味入前藥中攪調令勻瓷器收藏藥成霜雪紫色須密貯勿令泄氣每服一錢小兒減半新汲水調灌徐洄溪云方中黃金如用飛金萬頁研入尤妙以上三方藥甚珍貴初不敢選入簡效然暑邪直犯心包非此芳香逐穢清熱通竅之方不能奏績且非處處可買人人能購之藥特詳載之以便心存利濟者之易於修合也夏月傷寒略夏月傷寒者因畏熱而浴冷臥風或冰瓜過啖所致也乃暑月之陰濕證非病暑也輕者香薷正氣平胃五苓等藥重者大順冷香等方譬如避火而溺於水拯者但可云出之於水不可云出之於陰火也昔羅謙甫治商參政與完顏小將軍二案但用熱藥俱不名曰暑病又吳球治暑月遠行人案直曰中寒三案皆載名醫類案蓋恐後世誤以熱藥治暑故特舉病因以稱之可謂名正言順矣昧者猶不深究妄立陰暑之名眩惑後人若謂夏月傷寒為陰暑則冬月之紅爐暖閣羔酒狐裘而患火證者將謂之陽寒矣夫寒暑者乃天地一定之陰陽不容淆混惟司命之士須知隆冬有熱病盛夏有寒病用藥皆當諦審其脈證庶無倒行逆施之害也瘰癧乳岩疔瘡祕方楊素園大令曰瘰癧乳岩二證最稱難治余購得一祕方屢經試驗付潛齊刊以傳世方用丹雄雞金骨一副生取千里奔即驢馬騾修下蹄甲也五錢紫降香五兩當歸生甘草各一錢槐樹皮三十寸上六味以雞骨入麻油鍋內微火煎枯入後藥亦用微火煎枯去渣二油一丹收成膏浸冷水中拔去火氣不論已破未破量大小貼之以愈為度又一治面疔方甚簡效活𩺀魚一尾杵爛入研細辰砂拌勻圍之火即漸散漸微漸小其疔自拔百試百中治流注方徐洄溪云流注乃寒痰為風邪所引竄入經絡為毒也余治多人悉以大活絡丹愈之舍此別無對證之方矣按大活絡丹即俗稱再造丸者是也其但用二烏乳沒膽星地龍六味者名小活絡丹毒烈異常慎勿使用切記切記圍藥二方吳慎庵云洄溪以外科獨擅凡毒初起欲其不大故首重圍藥而方祕不傳余訪求既久得其最珍重者二方一曰束毒圍用玉精炭即蜒蚰煅存性生大黃各四兩五倍子白及各三兩生半夏白蘞各二兩百草霜礬紅生南星陳小粉炒草烏各一兩熊膽一錢共研末以廣膠化煬鮮芙蓉葉絞汁醋量和搗成錠治熱毒癰瘍發於陽分盤硬外疼色紅蔓腫者醋磨濃塗四圍空頭一曰疔圍專治疔瘡初起根腳不收堅硬發麻用生南星生半夏五倍子磁石煅陳小粉炒各一兩明礬生軍各二兩東丹六錢鐵鏽瓷粉各五錢雄黃蟾酥焙各四錢熊膽二錢白梅肉一兩四錢共為末豬膽汁打錠刺痧法吾鄉管榮棠樂善人也好施藥嘗曰痧邪深入血分必用刺法以泄其熱而通其絡曩遇桐鄉八十老人張德祥者善治痧數十年來生死決其針下百不失一凡針入而肌肉凝閉者必不得生然其所刺部位不僅玉衡書所言之十處惜世罕知囑余録入醫話以便窮鄉僻壤皆得按證而施救療也凡痧證頭暈者刺素髎穴在鼻柱上端準頭針入一寸頭痛者刺風府穴在項後入髮際一寸大筋內宛宛中針入一寸偏痛者刺風池穴在耳後顳顬後腦空下發際陷中針入一寸腹痛而吐者刺上脘穴在臍上五寸針入一寸腹痛而瀉者刺下脘穴在臍上二寸針入一寸腹痛而欲吐不吐欲瀉不瀉者刺中脘穴在臍上四寸針入一寸即愈以上三穴用手極力提起其皮而刺以上諸穴並不出血手瘛者刺商陽穴在手次指內側去爪甲如韭葉出血立已足吊者刺厲兌穴在足次指之端去爪甲如韭葉出血而已刺承筋穴在脛後足跟上七寸出血立已刺承山穴在腿肚下分肉間出血立已然此穴非精明者不易取宜慎刺牙關緊閉者刺人迎穴在結喉兩旁一寸五分大動脈應手處刺之立開
