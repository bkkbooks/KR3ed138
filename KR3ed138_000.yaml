front:
  text: 序古名臣大儒往往喜録單方以關生民疾苦而世之醫者每為卑鄙不足道何識量之不廣哉王君孟英謂一藥治病即古之奇方蓋一病原有一藥主治識之既真何須多品第病有可以常理測者夫婦與知其不可常理測者雖聖亦有所不能盡是以病機隱幻固非良手不為功而病情奇怪有非單方不能治在昔歐公暴痢幾絶乞藥於牛醫李防禦治嗽拜官得方於下走誠醫理之難窮而藥之不可以貴賤為優劣也即今道光間吾杭皇甫心安家有狐能治病以仙目之樂懷谷女方襁褓忽啼不止拍之則愈啼解衣視背見繡針微露其緒而針已全沒多醫治之雜以藥敷肉潰而針終不出狐令以磁石吸瘡口理極是也而亦罔效延至百日忽賣酒家聞之曰易耳第以銀杏仁去衣心杵爛菜油浸良久取油滴瘡孔中即出移時果針透瘡口而針則已彎蓋強拍入之也夫以狐而仙者豈智有不逮哉乃不為磁石引而為銀杏透真理之不可測矣由此推之一病必有一藥主治洵非虛語而單方之不可忽也益信因出願體醫話一冊願體集為康熙時史搢臣先生著其醫話亦皆切於濟世而救五絶諸法尤較他書詳備向為孟英舅氏俞君珍藏孟英復以魏柳洲續名醫類案中按語單方合而成帙末附自採簡效諸方付之梓其成厥舅志固已足多而所言一以生民疾苦為心勿私其藝抑亦王君識量之不可及也已咸豐三年癸丑仲冬杭州趙夢齡士雄學識淺陋所録簡效方一卷皆簡易而有效驗之方也然見聞不廣未敢質當世而張孝子養之蔣君敬堂連君書樵屢引史搢臣先生施藥不如施方之話相勖遂不揆譾佇附梓於史魏良方之後惟四方博雅咸以利濟為懷傳播祕方諒不吝教如荷匡余未逮隨時皆可續登跂豫望之虛左以俟癸丑長至日自記
